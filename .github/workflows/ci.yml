name: CI

# Roda lint, typecheck e build em cada push/PR — gate de qualidade antes do deploy.
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Scan de segredos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Varredura de segredos em arquivos rastreados
        run: |
          PAT='ghp_[A-Za-z0-9]{36}|sbp_[a-f0-9]{40}|sk_live_[A-Za-z0-9]{24}|rk_live_[A-Za-z0-9]{24}|whsec_[A-Za-z0-9]{30}|re_[A-Za-z0-9]{8}_[A-Za-z0-9]{20}|[0-9]{9,10}:AA[A-Za-z0-9_-]{33}|sntryu_[a-f0-9]{60}'
          HITS=$(git grep -lE "$PAT" -- . ':!docs/ROTACAO-CREDENCIAIS.md' ':!doc/' ':!backups/' ':!supabase/*.json' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Possíveis segredos encontrados nos arquivos:"; echo "$HITS"; exit 1
          fi
          echo "✓ Nenhum segredo conhecido em arquivos rastreados"

  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # valores dummy: o build não acessa serviços reais (páginas dinâmicas
          # só leem env em runtime). Os segredos reais ficam na Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_APP_URL: https://www.pytrack.com.br
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
